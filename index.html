<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Script Hub - Roblox Games</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">

    <style>
        :root {
            --bg-primary: #05050f;
            --bg-secondary: #0a0a18;
            --bg-card: rgba(16, 16, 30, 0.7);
            --border-card: rgba(255, 255, 255, 0.07);
            --text-primary: #f0f0f8;
            --text-secondary: #b0b0c8;
            --text-muted: #707088;
            --accent: #a855f7;
            --accent-glow: rgba(168, 85, 247, 0.4);
            --green: #34d399;
            --green-glow: rgba(52, 211, 153, 0.3);
            --radius-lg: 20px;
            --radius-md: 12px;
            --radius-sm: 8px;
            --transition: 0.2s ease;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow-x: hidden;
            position: relative;
        }

        /* Animated background */
        .bg-orb {
            position: fixed;
            border-radius: 50%;
            filter: blur(100px);
            opacity: 0.3;
            pointer-events: none;
            z-index: 0;
        }
        .bg-orb-1 {
            width: 400px;
            height: 400px;
            background: #7c3aed;
            top: -10%;
            left: -5%;
            animation: float 14s infinite alternate;
        }
        .bg-orb-2 {
            width: 350px;
            height: 350px;
            background: #2563eb;
            bottom: -8%;
            right: -5%;
            animation: float 16s infinite alternate-reverse;
        }
        .bg-orb-3 {
            width: 300px;
            height: 300px;
            background: #db2777;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            animation: float 18s infinite alternate;
            animation-delay: -5s;
        }
        @keyframes float {
            0% { transform: translate(0, 0) scale(1); }
            100% { transform: translate(40px, -30px) scale(1.1); }
        }

        .main-container {
            position: relative;
            z-index: 10;
            width: 90%;
            max-width: 650px;
            margin: 20px;
        }

        .glass-card {
            background: var(--bg-card);
            backdrop-filter: blur(35px);
            -webkit-backdrop-filter: blur(35px);
            border: 1px solid var(--border-card);
            border-radius: var(--radius-lg);
            padding: 32px 28px;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.6), 0 0 0 1px rgba(255, 255, 255, 0.04) inset;
            position: relative;
            overflow: hidden;
        }

        .glass-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 1px;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.2), transparent);
        }

        .card-header {
            text-align: center;
            margin-bottom: 32px;
        }

        .icon-wrap {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 52px;
            height: 52px;
            border-radius: 50%;
            background: rgba(168, 85, 247, 0.15);
            border: 1px solid rgba(168, 85, 247, 0.3);
            margin-bottom: 12px;
            font-size: 24px;
            box-shadow: 0 0 25px var(--accent-glow);
        }

        .card-title {
            font-size: 1.7rem;
            font-weight: 800;
            letter-spacing: -0.02em;
            background: linear-gradient(to right, #e0e0ff, #c0b0ff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 4px;
        }

        .card-subtitle {
            font-size: 0.85rem;
            color: var(--text-muted);
            font-weight: 400;
        }

        /* Games grid */
        .games-section {
            margin-bottom: 28px;
        }

        .games-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
            gap: 12px;
        }

        .game-card {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: var(--radius-sm);
            padding: 14px 12px;
            text-align: center;
            transition: all var(--transition);
            color: var(--text-primary);
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 8px;
            cursor: pointer;
            position: relative;
            overflow: hidden;
            user-select: none;
            outline: none;
        }

        .game-card:hover {
            background: rgba(255, 255, 255, 0.06);
            border-color: rgba(168, 85, 247, 0.5);
            transform: translateY(-4px);
            box-shadow: 0 12px 25px rgba(0, 0, 0, 0.4), 0 0 20px var(--accent-glow);
        }

        .game-card:focus-visible {
            border-color: rgba(168, 85, 247, 0.8);
            box-shadow: 0 0 0 2px rgba(168, 85, 247, 0.5);
        }

        .game-icon {
            font-size: 2rem;
            filter: drop-shadow(0 0 8px rgba(255,255,255,0.2));
        }

        .game-name {
            font-weight: 600;
            font-size: 0.85rem;
            line-height: 1.2;
            color: #e0d0ff;
        }

        .game-link-hint {
            font-size: 0.65rem;
            color: var(--text-muted);
            opacity: 0.7;
            display: flex;
            align-items: center;
            gap: 4px;
        }

        /* Copy script section */
        .script-wrapper {
            background: rgba(0, 0, 0, 0.4);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: var(--radius-md);
            overflow: hidden;
            margin-bottom: 20px;
        }

        .script-header {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 10px 14px;
            background: rgba(255,255,255,0.02);
            border-bottom: 1px solid rgba(255,255,255,0.04);
        }

        .dot {
            width: 9px;
            height: 9px;
            border-radius: 50%;
        }
        .dot.red { background: #ff5f57; }
        .dot.yellow { background: #febc2e; }
        .dot.green { background: #28c840; }
        .script-filename {
            margin-left: 6px;
            font-size: 0.7rem;
            color: var(--text-muted);
            font-family: 'JetBrains Mono', monospace;
            letter-spacing: 0.03em;
        }

        .script-content {
            padding: 14px 16px;
            font-family: 'JetBrains Mono', 'Fira Code', monospace;
            font-size: 0.78rem;
            line-height: 1.65;
            color: #c8c8d8;
            max-height: 240px;
            overflow-y: auto;
            white-space: pre-wrap;
            word-break: break-all;
            scrollbar-width: thin;
            scrollbar-color: rgba(255,255,255,0.1) transparent;
        }
        .script-content::-webkit-scrollbar {
            width: 4px;
        }
        .script-content::-webkit-scrollbar-thumb {
            background: rgba(255,255,255,0.15);
            border-radius: 10px;
        }

        /* Copy button */
        .btn-copy {
            width: 100%;
            padding: 14px 20px;
            border: none;
            border-radius: var(--radius-sm);
            background: linear-gradient(135deg, #8b5cf6, #7c3aed);
            color: white;
            font-family: 'Inter', sans-serif;
            font-size: 0.95rem;
            font-weight: 600;
            letter-spacing: 0.02em;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            transition: all var(--transition);
            box-shadow: 0 6px 20px rgba(124, 58, 237, 0.4);
            border: 1px solid rgba(255, 255, 255, 0.15);
            position: relative;
            overflow: hidden;
        }

        .btn-copy:hover {
            background: linear-gradient(135deg, #9d6fff, #8b5cf6);
            transform: translateY(-2px);
            box-shadow: 0 12px 30px rgba(124, 58, 237, 0.6), 0 0 50px rgba(168, 85, 247, 0.3);
            border-color: rgba(255, 255, 255, 0.3);
        }

        .btn-copy:active {
            transform: scale(0.97);
            transition: 0.1s;
        }

        .btn-copy.copied {
            background: linear-gradient(135deg, #34d399, #10b981);
            box-shadow: 0 6px 20px rgba(16, 185, 129, 0.5);
            border-color: rgba(52, 211, 153, 0.5);
        }

        /* Responsive */
        @media (max-width: 500px) {
            .glass-card {
                padding: 24px 16px;
            }
            .games-grid {
                grid-template-columns: repeat(2, 1fr);
            }
            .game-name {
                font-size: 0.8rem;
            }
        }
    </style>
</head>
<body>

    <!-- Background orbs -->
    <div class="bg-orb bg-orb-1"></div>
    <div class="bg-orb bg-orb-2"></div>
    <div class="bg-orb bg-orb-3"></div>

    <!-- Main UI -->
    <div class="main-container">
        <div class="glass-card">

            <!-- Header -->
            <div class="card-header">
                <div class="icon-wrap">🎮</div>
                <h1 class="card-title">Script Hub</h1>
                <p class="card-subtitle">Supported Roblox Games</p>
            </div>

            <!-- Game list (5 games) -->
            <div class="games-section">
                <div class="games-grid" id="gamesGrid">
                    <!-- Game cards generated by JavaScript -->
                </div>
            </div>

            <!-- Script display -->
            <div class="script-wrapper">
                <div class="script-header">
                    <span class="dot red"></span>
                    <span class="dot yellow"></span>
                    <span class="dot green"></span>
                    <span class="script-filename">main_script.lua</span>
                </div>
                <div class="script-content" id="scriptDisplay">-- Loading script...</div>
            </div>

            <!-- Copy button -->
            <button class="btn-copy" id="btnCopy">
                <span>📋</span> Copy Script
            </button>

        </div>
    </div>

    <!-- Toast notification -->
    <div id="toast" style="position:fixed; top:20px; right:20px; z-index:9999; background:rgba(20,20,35,0.9); backdrop-filter:blur(20px); border:1px solid rgba(255,255,255,0.15); border-radius:8px; padding:12px 20px; color:white; font-family:Inter,sans-serif; font-size:0.9rem; display:flex; align-items:center; gap:8px; box-shadow:0 10px 25px rgba(0,0,0,0.5); transform:translateX(120%); opacity:0; transition:all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); pointer-events:none;">
        <span id="toastIcon">✅</span>
        <span id="toastMsg">Berhasil disalin!</span>
    </div>

    <script>
        (function() {
            // ============ GAME DATA (5 Roblox games with map links) ============
            const games = [
                {
                    name: "INSIDE BRAINROT HEAD",
                    icon: "🧠",
                    url: "https://www.roblox.com/share?code=07da722e7305f44fada54bc86eef4fe7&type=ExperienceDetails&stamp=1781367257830"
                },
                {
                    name: "THROW A LUCKY BLOCK",
                    icon: "🎲",
                    url: "https://www.roblox.com/share?code=0118aec39fff1c4f8c2e916ec6616f50&type=ExperienceDetails&stamp=1782117840684"
                },
                {
                    name: "BECOME A BRAINROT",
                    icon: "🤪",
                    url: "https://www.roblox.com/share?code=0d96a7a9ed6481459b03ea1af254fca0&type=ExperienceDetails&stamp=1781367096165"
                },
                {
                    name: "CLIMB FOR LUCKY BLOCK",
                    icon: "🧗",
                    url: "https://www.roblox.com/share?code=5a95f6e893064c46bd5c151a2c78f3c3&type=ExperienceDetails&stamp=1781366964789"
                },
                {
                    name: "BE A LUCKY BLOCK FOR ANIME",
                    icon: "🍀",
                    url: "https://www.roblox.com/share?code=9aa06001935e7342ade852fcaa120a30&type=ExperienceDetails&stamp=1781809050942"
                }
            ];

            // ============ SCRIPT TO COPY ============
            const scriptToCopy = loadstring(game:HttpGet("https://raw.githubusercontent.com/trompetnohbhb-maker/isnide/refs/heads/main/sad"))()
  

            // ============ RENDER GAME CARDS dengan event listener yang pasti ============
            const gamesGrid = document.getElementById('gamesGrid');
            games.forEach(game => {
                const card = document.createElement('div');
                card.className = 'game-card';
                card.setAttribute('tabindex', '0');
                card.setAttribute('role', 'button');
                card.setAttribute('aria-label', game.name + ' - Buka di Roblox');
                card.innerHTML = `
                    <span class="game-icon">${game.icon}</span>
                    <span class="game-name">${game.name}</span>
                    <span class="game-link-hint">
                        <span>↗</span> Play
                    </span>
                `;

                // Event click untuk membuka link
                card.addEventListener('click', function(e) {
                    e.stopPropagation();
                    window.open(game.url, '_blank', 'noopener');
                });

                // Keyboard accessibility (Enter atau Space)
                card.addEventListener('keydown', function(e) {
                    if (e.key === 'Enter' || e.key === ' ') {
                        e.preventDefault();
                        window.open(game.url, '_blank', 'noopener');
                    }
                });

                gamesGrid.appendChild(card);
            });

            // ============ DISPLAY SCRIPT ============
            const scriptDisplay = document.getElementById('scriptDisplay');
            scriptDisplay.textContent = scriptToCopy;

            // ============ COPY FUNCTIONALITY ============
            const btnCopy = document.getElementById('btnCopy');
            const toast = document.getElementById('toast');
            const toastIcon = document.getElementById('toastIcon');
            const toastMsg = document.getElementById('toastMsg');

            let toastTimer = null;

            function showToast(icon, message, duration = 2800) {
                if (toastTimer) clearTimeout(toastTimer);
                toastIcon.textContent = icon;
                toastMsg.textContent = message;
                toast.style.transform = 'translateX(0)';
                toast.style.opacity = '1';
                toastTimer = setTimeout(() => {
                    toast.style.transform = 'translateX(120%)';
                    toast.style.opacity = '0';
                }, duration);
            }

            btnCopy.addEventListener('click', async () => {
                try {
                    await navigator.clipboard.writeText(scriptToCopy);
                    btnCopy.classList.add('copied');
                    const originalHTML = btnCopy.innerHTML;
                    btnCopy.innerHTML = '<span>✅</span> Tersalin!';

                    showToast('✅', 'Script berhasil disalin!');

                    setTimeout(() => {
                        btnCopy.classList.remove('copied');
                        btnCopy.innerHTML = originalHTML;
                    }, 2000);
                } catch (err) {
                    // Fallback
                    const textarea = document.createElement('textarea');
                    textarea.value = scriptToCopy;
                    textarea.style.position = 'fixed';
                    textarea.style.opacity = '0';
                    document.body.appendChild(textarea);
                    textarea.select();
                    try {
                        document.execCommand('copy');
                        showToast('✅', 'Script disalin (fallback)');
                    } catch (e) {
                        showToast('❌', 'Gagal menyalin script');
                    }
                    document.body.removeChild(textarea);
                }
            });

            // Keyboard shortcut: Ctrl+Shift+C to copy
            document.addEventListener('keydown', (e) => {
                if ((e.ctrlKey || e.metaKey) && e.shiftKey && e.key === 'C') {
                    e.preventDefault();
                    btnCopy.click();
                }
            });

            console.log('%c✨ Script Hub Ready %c| %cCtrl+Shift+C = Copy',
                'color:#a855f7;font-weight:bold;', '', 'color:#34d399;');
        })();
    </script>
</body>
</html>
