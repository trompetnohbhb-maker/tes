<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>YUTA FPS</title>
    <style>
        :root {
            --bg: #05050f;
            --card: rgba(20, 20, 40, 0.85);
            --border: rgba(255, 255, 255, 0.08);
            --text: #e0e0f0;
            --accent: #a855f7;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: var(--bg);
            font-family: 'Inter', system-ui, sans-serif;
            overflow: hidden;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }
        #gameCanvas {
            display: block;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            outline: none;
        }
        #ui {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 10;
        }
        .health-bar {
            position: absolute;
            bottom: 30px;
            left: 30px;
            width: 200px;
            height: 14px;
            background: rgba(0,0,0,0.6);
            border-radius: 7px;
            border: 1px solid rgba(255,255,255,0.2);
            overflow: hidden;
        }
        .health-fill {
            height: 100%;
            width: 100%;
            background: #ff4d6d;
            transition: width 0.3s;
        }
        .score {
            position: absolute;
            top: 30px;
            right: 30px;
            color: white;
            font-size: 1.5rem;
            font-weight: 800;
            text-shadow: 0 0 10px rgba(0,0,0,0.8);
        }
        .ammo {
            position: absolute;
            bottom: 30px;
            right: 30px;
            color: white;
            font-size: 1.2rem;
            font-weight: 600;
            text-shadow: 0 0 10px rgba(0,0,0,0.8);
        }
        .crosshair {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 20px;
            height: 20px;
        }
        .crosshair::before, .crosshair::after {
            content: '';
            position: absolute;
            background: rgba(255,255,255,0.8);
        }
        .crosshair::before {
            width: 2px;
            height: 20px;
            left: 9px;
            top: 0;
        }
        .crosshair::after {
            width: 20px;
            height: 2px;
            left: 0;
            top: 9px;
        }
        .message {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: white;
            font-size: 2rem;
            font-weight: 800;
            text-align: center;
            text-shadow: 0 0 20px black;
            pointer-events: none;
        }
        .controls-hint {
            position: absolute;
            bottom: 60px;
            left: 30px;
            color: rgba(255,255,255,0.6);
            font-size: 0.8rem;
        }
    </style>
</head>
<body>
    <div id="ui">
        <div class="score">Score: <span id="scoreValue">0</span></div>
        <div class="ammo">🔫 <span id="ammoValue">30</span></div>
        <div class="health-bar">
            <div class="health-fill" id="healthFill"></div>
        </div>
        <div class="crosshair"></div>
        <div class="message" id="message"></div>
        <div class="controls-hint">WASD: Move | Mouse: Look | Click: Shoot | R: Reload</div>
    </div>
    <canvas id="gameCanvas"></canvas>

    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.128.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.128.0/examples/jsm/"
            }
        }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { PointerLockControls } from 'three/addons/controls/PointerLockControls.js';

        // DOM elements
        const canvas = document.getElementById('gameCanvas');
        const scoreElement = document.getElementById('scoreValue');
        const ammoElement = document.getElementById('ammoValue');
        const healthFill = document.getElementById('healthFill');
        const messageElement = document.getElementById('message');

        // Game state
        let score = 0;
        let health = 100;
        let maxHealth = 100;
        let ammo = 30;
        let maxAmmo = 30;
        let gameOver = false;
        let enemies = [];
        let bullets = [];
        const enemySpeed = 0.08;
        const enemyDamage = 10;
        const bulletSpeed = 2;
        const shootCooldown = 200; // ms
        let canShoot = true;

        // Three.js setup
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x111122);
        scene.fog = new THREE.Fog(0x111122, 20, 80);

        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 100);
        camera.position.set(0, 1.6, 5);

        const renderer = new THREE.WebGLRenderer({ canvas, antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
        renderer.shadowMap.enabled = true;
        renderer.shadowMap.type = THREE.PCFSoftShadowMap;

        // Controls
        const controls = new PointerLockControls(camera, document.body);
        
        canvas.addEventListener('click', () => {
            if (!gameOver && !controls.isLocked) {
                controls.lock();
            }
        });

        controls.addEventListener('lock', () => {
            messageElement.textContent = '';
        });

        controls.addEventListener('unlock', () => {
            if (!gameOver) {
                messageElement.textContent = 'Click to play';
            }
        });

        // Lighting
        const ambientLight = new THREE.AmbientLight(0x404060, 0.5);
        scene.add(ambientLight);
        const dirLight = new THREE.DirectionalLight(0xffffff, 0.8);
        dirLight.position.set(10, 20, 5);
        dirLight.castShadow = true;
        dirLight.shadow.mapSize.width = 1024;
        dirLight.shadow.mapSize.height = 1024;
        dirLight.shadow.camera.near = 0.5;
        dirLight.shadow.camera.far = 50;
        dirLight.shadow.camera.left = -20;
        dirLight.shadow.camera.right = 20;
        dirLight.shadow.camera.top = 20;
        dirLight.shadow.camera.bottom = -20;
        scene.add(dirLight);
        const fillLight = new THREE.DirectionalLight(0x4466aa, 0.3);
        fillLight.position.set(-5, 0, 5);
        scene.add(fillLight);

        // Ground
        const groundGeometry = new THREE.PlaneGeometry(60, 60);
        const groundMaterial = new THREE.MeshStandardMaterial({ color: 0x1a1a2e, roughness: 0.8 });
        const ground = new THREE.Mesh(groundGeometry, groundMaterial);
        ground.rotation.x = -Math.PI / 2;
        ground.receiveShadow = true;
        scene.add(ground);

        // Grid lines on ground
        const gridHelper = new THREE.GridHelper(60, 40, 0x333355, 0x222244);
        scene.add(gridHelper);

        // Some buildings/obstacles
        function createBuilding(x, z, w, d, h, color) {
            const geometry = new THREE.BoxGeometry(w, h, d);
            const material = new THREE.MeshStandardMaterial({ color, roughness: 0.6 });
            const building = new THREE.Mesh(geometry, material);
            building.position.set(x, h/2, z);
            building.castShadow = true;
            building.receiveShadow = true;
            scene.add(building);
            return building;
        }

        createBuilding(-8, -8, 3, 3, 4, 0x445566);
        createBuilding(8, -8, 3, 3, 5, 0x556644);
        createBuilding(-8, 8, 4, 4, 3, 0x665544);
        createBuilding(8, 8, 2, 2, 6, 0x445544);
        createBuilding(0, -12, 2, 4, 4, 0x554466);
        createBuilding(-12, 0, 3, 2, 5, 0x664455);
        createBuilding(12, 0, 2, 3, 4, 0x446655);
        createBuilding(0, 12, 3, 3, 3, 0x556655);

        // Enemy creation
        function createEnemy() {
            const geometry = new THREE.SphereGeometry(0.5, 8, 8);
            const material = new THREE.MeshStandardMaterial({ color: 0xff4444, roughness: 0.3 });
            const enemy = new THREE.Mesh(geometry, material);
            enemy.castShadow = true;
            enemy.receiveShadow = true;
            
            // Random position on ground
            const angle = Math.random() * Math.PI * 2;
            const distance = 8 + Math.random() * 8;
            const x = Math.cos(angle) * distance;
            const z = Math.sin(angle) * distance;
            enemy.position.set(x, 0.5, z);
            
            // Add eyes
            const eyeGeom = new THREE.SphereGeometry(0.1, 4, 4);
            const eyeMat = new THREE.MeshBasicMaterial({ color: 0x000000 });
            const leftEye = new THREE.Mesh(eyeGeom, eyeMat);
            const rightEye = new THREE.Mesh(eyeGeom, eyeMat);
            leftEye.position.set(-0.15, 0.15, 0.4);
            rightEye.position.set(0.15, 0.15, 0.4);
            enemy.add(leftEye);
            enemy.add(rightEye);
            
            scene.add(enemy);
            enemies.push({
                mesh: enemy,
                health: 3,
                speed: enemySpeed + Math.random() * 0.03,
            });
        }

        // Bullet creation
        function shoot() {
            if (ammo <= 0 || !canShoot || gameOver) return;
            ammo--;
            ammoElement.textContent = ammo;
            canShoot = false;
            setTimeout(() => { canShoot = true; }, shootCooldown);

            const bulletGeom = new THREE.SphereGeometry(0.05, 4, 4);
            const bulletMat = new THREE.MeshBasicMaterial({ color: 0xffdd57 });
            const bullet = new THREE.Mesh(bulletGeom, bulletMat);
            bullet.position.copy(camera.position);
            bullet.position.y -= 0.1;
            
            const direction = new THREE.Vector3(0, 0, -1);
            direction.applyQuaternion(camera.quaternion);
            direction.normalize();
            
            bullet.userData = {
                velocity: direction.multiplyScalar(bulletSpeed),
                life: 3, // seconds
            };
            
            scene.add(bullet);
            bullets.push(bullet);
        }

        // Reload
        function reload() {
            if (ammo === maxAmmo || gameOver) return;
            ammo = maxAmmo;
            ammoElement.textContent = ammo;
        }

        // Keyboard input
        const keys = { w: false, a: false, s: false, d: false };
        window.addEventListener('keydown', (e) => {
            if (e.key === 'r' || e.key === 'R') reload();
            if (e.key.toLowerCase() in keys) keys[e.key.toLowerCase()] = true;
        });
        window.addEventListener('keyup', (e) => {
            if (e.key.toLowerCase() in keys) keys[e.key.toLowerCase()] = false;
        });
        window.addEventListener('mousedown', (e) => {
            if (e.button === 0 && controls.isLocked && !gameOver) {
                shoot();
            }
        });

        // Game loop
        function update() {
            if (gameOver) return;
            
            // Player movement
            if (controls.isLocked) {
                const speed = 0.12;
                const moveX = (keys.d ? 1 : 0) - (keys.a ? 1 : 0);
                const moveZ = (keys.s ? 1 : 0) - (keys.w ? 1 : 0);
                if (moveX !== 0 || moveZ !== 0) {
                    const forward = new THREE.Vector3(0, 0, -1).applyQuaternion(camera.quaternion);
                    forward.y = 0;
                    forward.normalize();
                    const right = new THREE.Vector3(1, 0, 0).applyQuaternion(camera.quaternion);
                    right.y = 0;
                    right.normalize();
                    
                    const direction = new THREE.Vector3();
                    direction.addScaledVector(forward, -moveZ);
                    direction.addScaledVector(right, moveX);
                    direction.normalize();
                    
                    const newPos = camera.position.clone().add(direction.multiplyScalar(speed));
                    // Boundary check
                    if (Math.abs(newPos.x) < 30 && Math.abs(newPos.z) < 30) {
                        camera.position.copy(newPos);
                    }
                }
            }

            // Update bullets
            for (let i = bullets.length - 1; i >= 0; i--) {
                const bullet = bullets[i];
                bullet.position.add(bullet.userData.velocity);
                bullet.userData.life -= 0.016;
                
                // Check collision with enemies
                let bulletHit = false;
                for (let j = enemies.length - 1; j >= 0; j--) {
                    const enemy = enemies[j];
                    const dist = bullet.position.distanceTo(enemy.mesh.position);
                    if (dist < 0.7) {
                        enemy.health--;
                        bulletHit = true;
                        if (enemy.health <= 0) {
                            scene.remove(enemy.mesh);
                            enemies.splice(j, 1);
                            score += 10;
                            scoreElement.textContent = score;
                        }
                        break;
                    }
                }
                
                if (bulletHit || bullet.userData.life <= 0) {
                    scene.remove(bullet);
                    bullets.splice(i, 1);
                }
            }

            // Update enemies
            for (let i = enemies.length - 1; i >= 0; i--) {
                const enemy = enemies[i];
                // Move toward player
                const direction = new THREE.Vector3();
                direction.copy(camera.position).sub(enemy.mesh.position);
                direction.y = 0;
                const distanceToPlayer = direction.length();
                direction.normalize();
                enemy.mesh.position.add(direction.multiplyScalar(enemy.speed));
                
                // Look at player
                enemy.mesh.lookAt(camera.position.x, enemy.mesh.position.y, camera.position.z);
                
                // Damage player if close
                if (distanceToPlayer < 1.2) {
                    health -= enemyDamage * 0.02;
                    healthFill.style.width = Math.max(0, health) + '%';
                    if (health <= 0) {
                        health = 0;
                        gameOver = true;
                        messageElement.textContent = 'GAME OVER\nClick to restart';
                        controls.unlock();
                    }
                }
            }

            // Spawn enemies periodically
            if (enemies.length < 8 && Math.random() < 0.02) {
                createEnemy();
            }
        }

        function animate() {
            requestAnimationFrame(animate);
            update();
            renderer.render(scene, camera);
        }

        // Handle window resize
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        // Start with some enemies
        for (let i = 0; i < 4; i++) {
            createEnemy();
        }

        // Initial message
        messageElement.textContent = 'Click to play';
        ammoElement.textContent = ammo;
        scoreElement.textContent = score;
        healthFill.style.width = '100%';

        // Restart functionality
        canvas.addEventListener('dblclick', () => {
            if (gameOver) {
                // Reset game
                score = 0;
                health = maxHealth;
                ammo = maxAmmo;
                gameOver = false;
                scoreElement.textContent = score;
                ammoElement.textContent = ammo;
                healthFill.style.width = '100%';
                messageElement.textContent = '';
                // Remove all enemies and bullets
                enemies.forEach(e => scene.remove(e.mesh));
                enemies = [];
                bullets.forEach(b => scene.remove(b));
                bullets = [];
                // Spawn new enemies
                for (let i = 0; i < 4; i++) createEnemy();
                camera.position.set(0, 1.6, 5);
                controls.lock();
            }
        });

        animate();
    </script>
</body>
</html>
